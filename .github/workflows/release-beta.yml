name: Release Beta

on:
  push:
    tags:
      - 'v*-beta.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Optional tag override (e.g. v0.1.0-beta.1). Defaults to v{package.json}-beta.{run}.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: spanwork-release-beta-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/release-common.yml
    with:
      channel: beta
      tag_name: ${{ inputs.tag_name || '' }}
    secrets: inherit

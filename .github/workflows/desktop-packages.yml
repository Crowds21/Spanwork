name: Desktop Client Packages

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  package:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact: spanwork-macos-installers
          - name: Windows
            os: windows-latest
            artifact: spanwork-windows-installers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop package
        run: pnpm tauri:build
        env:
          CARGO_INCREMENTAL: 0
          RUST_BACKTRACE: 1

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  publish-release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged installers
        uses: actions/download-artifact@v4
        with:
          pattern: spanwork-*-installers-${{ github.sha }}
          path: release-assets
          merge-multiple: true

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          short_sha="${GITHUB_SHA::7}"

          echo "tag=desktop-v${version}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "title=Spanwork Desktop v${version} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          notes="Automated desktop client release for commit ${GITHUB_SHA}."

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$notes" \
              --latest
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes "$notes" \
              --latest
          fi

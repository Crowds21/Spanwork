name: Desktop Client Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  package:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact: spanwork-macos-installers
          - name: Windows
            os: windows-latest
            artifact: spanwork-windows-installers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop package
        run: pnpm tauri:build
        env:
          CARGO_INCREMENTAL: 0
          RUST_BACKTRACE: 1

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

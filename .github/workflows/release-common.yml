name: Release (common)

on:
  workflow_call:
    inputs:
      channel:
        description: beta or release
        required: true
        type: string
      tag_name:
        description: Optional override tag for workflow_dispatch
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: spanwork-release-${{ inputs.channel }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.meta.outputs.channel }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      marketing_version: ${{ steps.meta.outputs.marketing_version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      release_title: ${{ steps.meta.outputs.release_title }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: bash .github/scripts/release-metadata.sh "${{ inputs.channel }}"

  desktop-package:
    name: Build ${{ matrix.name }} installer
    needs: resolve
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact: spanwork-macos-installers
          - name: Windows
            os: windows-latest
            artifact: spanwork-windows-installers

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Patch app version
        env:
          MARKETING_VERSION: ${{ needs.resolve.outputs.marketing_version }}
          BUILD_NUMBER: ${{ needs.resolve.outputs.build_number }}
        run: bash .github/scripts/patch-app-version.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop package
        run: pnpm tauri:build
        env:
          CARGO_INCREMENTAL: 0
          RUST_BACKTRACE: 1

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  ios-testflight:
    name: Build iOS and upload TestFlight
    needs: resolve
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Patch app version
        env:
          MARKETING_VERSION: ${{ needs.resolve.outputs.marketing_version }}
          BUILD_NUMBER: ${{ needs.resolve.outputs.build_number }}
        run: bash .github/scripts/patch-app-version.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Apple signing assets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: bash .github/scripts/apple-signing.sh

      - name: Write tauri.ios.conf.json
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: bash .github/scripts/write-tauri-ios-conf.sh

      - name: Initialize iOS project
        working-directory: apps/spanwork
        run: pnpm tauri ios init --ci

      - name: Install CocoaPods
        working-directory: apps/spanwork/src-tauri/gen/apple
        run: pod install

      - name: Build iOS (App Store Connect export)
        working-directory: apps/spanwork
        run: >-
          pnpm tauri ios build
          --export-method app-store-connect
          --ci
          --build-number ${{ needs.resolve.outputs.build_number }}

      - name: Upload to App Store Connect
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: bash .github/scripts/upload-ipa-appstore-connect.sh

      - uses: actions/upload-artifact@v4
        with:
          name: spanwork-ios-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: apps/spanwork/src-tauri/gen/apple/build/**/*.ipa

  publish-github:
    name: Publish GitHub Release
    needs: [resolve, desktop-package, ios-testflight]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: spanwork-*-${{ github.sha }}
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.resolve.outputs.release_title }}
          PRERELEASE: ${{ needs.resolve.outputs.prerelease }}
        run: bash .github/scripts/publish-github-release.sh

  app-store-submit:
    name: App Store submit gate
    needs: [resolve, ios-testflight, publish-github]
    if: needs.resolve.outputs.channel == 'release'
    runs-on: ubuntu-latest
    environment: app-store
    steps:
      - name: Post-upload checklist
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          MARKETING_VERSION: ${{ needs.resolve.outputs.marketing_version }}
          BUILD_NUMBER: ${{ needs.resolve.outputs.build_number }}
        run: |
          set -euo pipefail
          cat >> "${GITHUB_STEP_SUMMARY}" <<EOF
          ## App Store release ${RELEASE_TAG}

          - Marketing version: \`${MARKETING_VERSION}\`
          - iOS build number: \`${BUILD_NUMBER}\`
          - IPA uploaded to App Store Connect (TestFlight processing).

          ### Next steps (manual until Fastlane deliver is wired)
          1. Open [App Store Connect](https://appstoreconnect.apple.com/) → TestFlight → confirm build **${BUILD_NUMBER}** is processed.
          2. Complete version metadata (screenshots, description, privacy URL) if not done.
          3. Submit build **${BUILD_NUMBER}** for App Review, or add \`fastlane deliver\` to this job.

          GitHub Release **${RELEASE_TAG}** published with desktop installers.
          EOF

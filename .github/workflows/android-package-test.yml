name: Android Package Test

on:
  push:
    branches:
      - cursor/ci-testbed-d2b6
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANDROID_NDK_VERSION: 27.0.12077973

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: >-
          sdkmanager
          "platforms;android-36"
          "build-tools;36.0.0"
          "ndk;${ANDROID_NDK_VERSION}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        working-directory: apps/spanwork
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: pnpm tauri android init --ci --skip-targets-install

      - name: Build Android debug APK
        working-directory: apps/spanwork
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          CI: true
        run: pnpm tauri android build --apk --debug --ci --target aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: spanwork-android-debug-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/spanwork/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
